<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>הרשמה – בונים מילים</title>
<link rel="stylesheet" href="../styles/style.css">
</head>
<body class="page-center">

<div class="login-card">
    <div class="dino-logo">🦕</div>
    <h1>הרשמה</h1>

    <form id="registerForm">
        <div class="field">
            <input type="text" id="playerName" placeholder="שם משתמש" required autocomplete="off">
        </div>
        <div class="field">
            <input type="password" id="password" placeholder="סיסמה" required>
        </div>
        <div class="field">
            <input type="password" id="passwordConfirm" placeholder="אימות סיסמה" required>
        </div>
        <button type="submit" class="btn-main">הרשמה</button>
    </form>

    <p class="register-link">כבר רשום? <a href="../docs/login.html">כניסה</a></p>
</div>

<script src="../scripts/register.js" defer></script>
</body>
</html>
