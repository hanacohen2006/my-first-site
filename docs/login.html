<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>כניסה – בונים מילים</title>
<link rel="stylesheet" href="../styles/style.css">
</head>
<body class="page-center">

<div class="login-card">
    <div class="dino-logo">🦕</div>
    <h1>בונים מילים</h1>

    <form id="loginForm">
        <div class="field">
            <input type="text" id="playerName" placeholder="שם משתמש" required autocomplete="off">
        </div>
        <div class="field">
            <input type="password" id="password" placeholder="סיסמה" required>
        </div>
        <div class="field">
            <select id="role">
                <option value="player">🎮 שחקן</option>
                <option value="admin">🛠️ מנהל</option>
            </select>
        </div>
        <button type="submit" class="btn-main">כניסה</button>
    </form>

    <p class="register-link">משתמש חדש? <a href="../docs/register.html">הרשמה</a></p>
</div>

<script src="../scripts/login.js" defer></script>
</body>
</html>
