<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<title>בונים מילים 🦕</title>

<body class="page-center">

<div class="welcome-card">

    <!-- ══ דובי קופץ ══ -->
    <div class="bear-outer">
        <div class="bear-stage">

            <!-- ניצוצות -->
            <svg class="sparkle-el" style="left:5px;top:14px;animation-delay:0s" width="14" height="14" viewBox="0 0 14 14">
                <path d="M7 0L8.4 5.2H13.7L9.3 8.3L10.7 14L7 10.9L3.3 14L4.7 8.3L.3 5.2H5.6Z" fill="#e879f9"/>
            </svg>
            <svg class="sparkle-el" style="right:3px;top:22px;animation-delay:0.3s" width="10" height="10" viewBox="0 0 14 14">
                <path d="M7 0L8.4 5.2H13.7L9.3 8.3L10.7 14L7 10.9L3.3 14L4.7 8.3L.3 5.2H5.6Z" fill="#c4b5fd"/>
            </svg>
            <svg class="sparkle-el" style="left:17px;top:3px;animation-delay:0.6s" width="8" height="8" viewBox="0 0 14 14">
                <path d="M7 0L8.4 5.2H13.7L9.3 8.3L10.7 14L7 10.9L3.3 14L4.7 8.3L.3 5.2H5.6Z" fill="#f0abfc"/>
            </svg>
            <svg class="sparkle-el" style="right:15px;top:6px;animation-delay:0.9s" width="9" height="9" viewBox="0 0 14 14">
                <path d="M7 0L8.4 5.2H13.7L9.3 8.3L10.7 14L7 10.9L3.3 14L4.7 8.3L.3 5.2H5.6Z" fill="#a78bfa"/>
            </svg>

            <!-- הדובי -->
            <svg class="bear-svg" onclick="bop()"
                 width="90" height="102" viewBox="0 0 90 102" fill="none"
                 xmlns="http://www.w3.org/2000/svg" aria-label="דובי קופץ">

                <!-- גוף -->
                <ellipse cx="45" cy="72" rx="28" ry="26" fill="#581c87"/>
                <!-- בטן – גרדיאנט סגול-ורוד -->
                <ellipse cx="45" cy="75" rx="16" ry="16" fill="#9333ea" opacity="0.65"/>
                <!-- ניצוץ ורוד על הבטן -->
                <ellipse cx="45" cy="72" rx="10" ry="9" fill="#db2777" opacity="0.18"/>

                <!-- ידיים -->
                <ellipse cx="17" cy="72" rx="10" ry="8" fill="#6b21a8" transform="rotate(-15 17 72)"/>
                <ellipse cx="73" cy="72" rx="10" ry="8" fill="#6b21a8" transform="rotate(15 73 72)"/>

                <!-- רגליים -->
                <ellipse cx="35" cy="95" rx="9" ry="7" fill="#7c3aed"/>
                <ellipse cx="55" cy="95" rx="9" ry="7" fill="#7c3aed"/>

                <!-- כפות -->
                <ellipse cx="34"  cy="100" rx="10" ry="5" fill="#581c87"/>
                <ellipse cx="56"  cy="100" rx="10" ry="5" fill="#581c87"/>

                <!-- ראש -->
                <circle cx="45" cy="38" r="26" fill="#581c87"/>
                <!-- ברק ורוד-כחול על הראש -->
                <ellipse cx="38" cy="28" rx="14" ry="10" fill="#7e22ce" opacity="0.5"/>

                <!-- אוזן שמאל -->
                <g class="ear-left">
                    <circle cx="28" cy="16" r="11" fill="#6b21a8"/>
                    <circle cx="28" cy="16" r="7"  fill="#c026d3" opacity="0.55"/>
                </g>

                <!-- אוזן ימין -->
                <g class="ear-right">
                    <circle cx="62" cy="16" r="11" fill="#6b21a8"/>
                    <circle cx="62" cy="16" r="7"  fill="#c026d3" opacity="0.55"/>
                </g>

                <!-- ברק כחול-סגול על הפנים -->
                <ellipse cx="45" cy="40" rx="18" ry="18" fill="#7c3aed" opacity="0.15"/>

                <!-- עיניים לבן -->
                <circle cx="36" cy="35" r="5.5" fill="white"/>
                <circle cx="54" cy="35" r="5.5" fill="white"/>
                <!-- אישון – סגול כהה -->
                <circle cx="37" cy="35" r="3"   fill="#1e1b4b"/>
                <circle cx="55" cy="35" r="3"   fill="#1e1b4b"/>
                <!-- ברק עיניים -->
                <circle cx="38.5" cy="33.5" r="1.2" fill="white"/>
                <circle cx="56.5" cy="33.5" r="1.2" fill="white"/>

                <!-- אף ורוד -->
                <ellipse cx="45"   cy="43" rx="5.5" ry="3.5" fill="#be185d"/>
                <ellipse cx="43.5" cy="42" rx="1.5"  ry="1"   fill="white" opacity="0.45"/>

                <!-- חיוך -->
                <path d="M39 48 Q45 54 51 48"
                      stroke="#f9a8d4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9"/>

                <!-- לחיים ורודות -->
                <ellipse cx="31" cy="45" rx="6" ry="4" fill="#ec4899" opacity="0.35"/>
                <ellipse cx="59" cy="45" rx="6" ry="4" fill="#ec4899" opacity="0.35"/>

                <!-- כוכב על החזה – זהב-ורוד -->
                <path d="M45 62 L46.5 67 L52 67 L47.5 70 L49 75
                         L45 72 L41 75 L42.5 70 L38 67 L43.5 67 Z"
                      fill="#f0abfc" opacity="0.95"/>
                <!-- ברק על הכוכב -->
                <path d="M45 64 L46 67.5 L49.5 67.5 L46.8 69.5 L47.8 73
                         L45 71 L42.2 73 L43.2 69.5 L40.5 67.5 L44 67.5 Z"
                      fill="white" opacity="0.3"/>
            </svg>

        </div><!-- /bear-stage -->

        <div class="bear-shadow"></div>
        <p id="bearMsg">לחץ עלי לשחק! 🐾</p>
    </div><!-- /bear-outer -->

    <!-- ══ תוכן מקורי ══ -->
    <div class="dino-logo">🦕</div>
    <h1>בונים מילים</h1>
    <p class="subtitle">משחק מילים בעברית – כמה מילים תצליח לבנות?</p>

</div><!-- /welcome-card -->
