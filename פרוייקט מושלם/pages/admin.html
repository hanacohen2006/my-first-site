<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ניהול – בונים מילים</title>
<link rel="stylesheet" href="../styles/style.css">
</head>
<body class="admin-body">

<div class="admin-wrap">

    <!-- כותרת -->
    <div class="admin-header">
        <h1>🛠️ מערכת ניהול</h1>
        <a href="../pages/index.html" class="btn-exit">יציאה</a>
    </div>

    <!-- כרטיסי סטטיסטיקה -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-num" id="statPlayers">0</div>
            <div class="stat-label">שחקנים רשומים</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="statTopScore">0</div>
            <div class="stat-label">שיא עולמי</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="statAvg">0</div>
            <div class="stat-label">ממוצע ניקוד</div>
        </div>
    </div>

    <!-- חיפוש -->
    <div class="admin-toolbar">
        <input type="text" id="searchInput" placeholder="🔍 חיפוש שחקן..." oninput="filterTable()">
        <button class="btn-danger" onclick="clearAll()">🗑️ נקה הכל</button>
    </div>

    <!-- טבלה -->
    <div class="table-wrap">
        <table id="playersTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>שם שחקן</th>
                    <th>שיא אישי</th>
                    <th>פעולות</th>
                </tr>
            </thead>
            <tbody id="playersBody">
            </tbody>
        </table>
        <div id="emptyMsg" class="empty-table" style="display:none">אין שחקנים רשומים עדיין</div>
    </div>

</div>

<script src="../scripts/admin.js"></script>
</body>
</html>
